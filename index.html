<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛩️ Amelia Earhart — Dare to Fly</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Lato", sans-serif;
    overflow-x: hidden;
    padding: 20px;
  }

  /* Sky gradient background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #1a1040 0%, #0a0520 40%, #000008 100%);
    z-index: 0;
  }

  /* Stars */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 55%, rgba(255,220,100,0.5) 0%, transparent 100%);
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 500px;
    width: 100%;
  }

  .title-badge {
    font-family: "Special Elite", cursive;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c8a84b;
    margin-bottom: 6px;
    opacity: 0.85;
  }

  h1 {
    font-family: "Special Elite", cursive;
    font-size: clamp(26px, 6vw, 38px);
    color: #f0e8d0;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 24px;
    text-shadow: 0 0 40px rgba(200, 168, 75, 0.3);
  }

  /* Speech bubble */
  .speech-bubble {
    position: relative;
    background: rgba(255, 250, 235, 0.96);
    border: 2px solid #c8a84b;
    border-radius: 14px;
    padding: 16px 20px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(200,168,75,0.15);
    transition: opacity 0.4s;
  }

  .speech-bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 14px solid #c8a84b;
  }
  .speech-bubble::before {
    content: "";
    position: absolute;
    bottom: -11px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 12px solid rgba(255,250,235,0.96);
    z-index: 1;
  }

  .bubble-text {
    font-family: "Special Elite", cursive;
    font-size: 15px;
    color: #2a1a00;
    line-height: 1.5;
    transition: opacity 0.3s;
  }

  .bubble-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8a84b;
    margin-top: 6px;
    font-family: "Lato", sans-serif;
    font-weight: 700;
  }

  /* Photo frame */
  .photo-wrap {
    position: relative;
    cursor: pointer;
    user-select: none;
    margin: 10px 0 18px;
  }

  .photo-frame {
    width: 260px;
    height: 340px;
    border: 4px solid #c8a84b;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 8px rgba(200,168,75,0.08),
      0 0 60px rgba(200,168,75,0.2),
      0 20px 60px rgba(0,0,0,0.6);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .photo-frame:hover {
    transform: scale(1.02);
    box-shadow:
      0 0 0 8px rgba(200,168,75,0.15),
      0 0 80px rgba(200,168,75,0.35),
      0 25px 70px rgba(0,0,0,0.7);
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.35s ease;
    position: absolute;
    top: 0; left: 0;
  }

  #img1 { opacity: 1; }
  #img2 { opacity: 0; }

  .click-hint {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(200,168,75,0.85);
    color: #1a0a00;
    font-size: 9px;
    letter-spacing: 1.5px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 3px;
    font-family: "Lato", sans-serif;
    pointer-events: none;
  }

  /* Ripple on click */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,168,75,0.35);
    animation: ripple-anim 0.6s ease-out forwards;
    pointer-events: none;
    transform: scale(0);
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  /* Milestones strip */
  .milestone-strip {
    background: rgba(200,168,75,0.07);
    border: 1px solid rgba(200,168,75,0.2);
    border-radius: 8px;
    padding: 14px 18px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 22px;
  }

  .milestone-strip h3 {
    font-family: "Special Elite", cursive;
    color: #c8a84b;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .milestone-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 7px;
  }

  .m-year {
    font-family: "Special Elite", cursive;
    font-size: 12px;
    color: #c8a84b;
    min-width: 36px;
    padding-top: 1px;
  }

  .m-text {
    font-size: 12px;
    color: rgba(240,232,208,0.8);
    line-height: 1.4;
  }

  /* CTA Button */
  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #c8a84b 0%, #e8c86a 50%, #a87830 100%);
    color: #0a0300;
    font-family: "Lato", sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 36px;
    border-radius: 2px;
    box-shadow: 0 4px 24px rgba(200,168,75,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 4px;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(200,168,75,0.55);
  }

  .footer-note {
    font-size: 11px;
    color: rgba(200,168,75,0.4);
    margin-top: 20px;
    letter-spacing: 1px;
  }
</style>
</head>

<script>
  // --- Content ---
  const quotes = [
    { text: "The most effective way to do it, is to do it.", tag: "Amelia Earhart" },
    { text: "Your landing page works 24/7 — even while you sleep.", tag: "EasyWebX" },
    { text: "The most difficult thing is the decision to act, the rest is merely tenacity.", tag: "Amelia Earhart" },
    { text: "96% of visitors don't buy on the first visit. A page that captures leads wins them back.", tag: "EasyWebX" },
    { text: "Adventure is worthwhile in itself.", tag: "Amelia Earhart" },
    { text: "One clear call-to-action means visitors know exactly what to do next.", tag: "EasyWebX" },
    { text: "Courage is the price that life exacts for granting peace.", tag: "Amelia Earhart" },
    { text: "5× more conversions vs. a generic homepage. That's not luck — that's a landing page.", tag: "EasyWebX" },
    { text: "There's more to life than being a passenger.", tag: "Amelia Earhart" },
    { text: "80% of businesses without a page lose customers daily. Don't be one of them.", tag: "EasyWebX" },
    { text: "The fears are paper tigers. You can do anything you decide to do.", tag: "Amelia Earhart" },
    { text: "Launch fast. Go live. Customers start arriving from day one.", tag: "EasyWebX" },
    { text: "Everyone has oceans to fly, if they have the heart to do it.", tag: "Amelia Earhart" },
    { text: "Send visitors from ads, social & Google to a page built to convert.", tag: "EasyWebX" },
    { text: "Women, like men, should try to do the impossible.", tag: "Amelia Earhart" },
    { text: "No borders, just horizons — only freedom.", tag: "Amelia Earhart" },
    { text: "Never interrupt someone doing what you said couldn't be done.", tag: "Amelia Earhart" },
    { text: "Your best salesperson never sleeps, never takes a day off, never misses a lead.", tag: "EasyWebX" },
  ];

  let quoteIndex = 0;
  let imgShowing = 1;

  function showQuote(index) {
    const q = quotes[index];
    const bt = document.getElementById("bubbleText");
    const tag = document.getElementById("bubbleTag");
    bt.style.opacity = 0;
    setTimeout(() => {
      bt.textContent = "“" + q.text + "”";
      tag.textContent = "— " + q.tag;
      bt.style.opacity = 1;
    }, 300);
  }

  showQuote(0);

  setInterval(() => {
    quoteIndex = (quoteIndex + 1) % quotes.length;
    showQuote(quoteIndex);
  }, 5000);

  // --- Radio tone sound via Web Audio API ---
  function playRadioTone() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Static noise burst
    const bufferSize = ctx.sampleRate * 0.18;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.35;
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(1, ctx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);

    noise.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start();
    noise.stop(ctx.currentTime + 0.18);

    // Morse-style click tones
    const toneFreqs = [800, 1200, 600, 1000];
    toneFreqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gainNode.gain.setValueAtTime(0, ctx.currentTime + i * 0.07);
      gainNode.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.07 + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.07 + 0.06);
      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.07);
      osc.stop(ctx.currentTime + i * 0.07 + 0.08);
    });
  }

  // --- Image toggle ---
  function toggleImage(event) {
    playRadioTone();

    // Ripple effect
    const frame = document.getElementById("photoFrame");
    const rect = frame.getBoundingClientRect();
    const ripple = document.createElement("div");
    ripple.className = "ripple";
    const size = Math.max(frame.offsetWidth, frame.offsetHeight);
    ripple.style.width = ripple.style.height = size + "px";
    ripple.style.left = (event.clientX - rect.left - size / 2) + "px";
    ripple.style.top = (event.clientY - rect.top - size / 2) + "px";
    frame.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);

    // Swap images
    const img1 = document.getElementById("img1");
    const img2 = document.getElementById("img2");
    if (imgShowing === 1) {
      img1.style.opacity = 0;
      img2.style.opacity = 1;
      imgShowing = 2;
    } else {
      img1.style.opacity = 1;
      img2.style.opacity = 0;
      imgShowing = 1;
    }

    // Advance quote
    quoteIndex = (quoteIndex + 1) % quotes.length;
    showQuote(quoteIndex);
  }
</script>
